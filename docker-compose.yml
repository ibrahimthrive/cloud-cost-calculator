services:
  cost-calculator:
    build: .
    image: cloud-cost-calculator:latest
    container_name: cloud-cost-calculator
    ports:
      - "8501:8501"
    volumes:
      - cost-calculator-data:/app/data
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  cost-calculator-data:
